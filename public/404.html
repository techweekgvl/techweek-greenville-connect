<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tech Week Greenville</title>
    <script>
      // SPA fallback for GitHub Pages: rewrite the path into a query string
      // and bounce to / so React Router can take over.
      // Pattern: https://github.com/rafgraph/spa-github-pages
      (function () {
        var segmentCount = 0; // custom domain at root
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
